name: Automatická Kontrola a Kompilace EXE

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  # JOB 1: Keep the 30-minute cloud check completely automated
  track-followers:
    runs-on: ubuntu-latest
    steps:
      - name: Načíst kód z repozitáře
        uses: actions/checkout@v4

      - name: Nastavit Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Nainstalovat knihovny
        run: pip install requests supabase

      - name: Spustit skript v cloudu
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python tracker.py

  # JOB 2: Build a Windows Executable dynamically in the cloud
  build-exe:
    runs-on: windows-latest
    steps:
      - name: Načíst kód z repozitáře
        uses: actions/checkout@v4

      - name: Nastavit Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Nainstalovat závislosti pro kompilaci
        run: pip install requests supabase pyinstaller

      - name: Zkompilovat kód do EXE
        run: pyinstaller --onefile tracker.py

      - name: Nahrát hotový soubor na GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Tracker-Program
          path: dist/tracker.exe
