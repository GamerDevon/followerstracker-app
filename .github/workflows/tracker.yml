name: Automatický Sledovač Změn do Supabase

on:
  schedule:
    # This CRON expression tells GitHub to run this script automatically every 30 minutes, 24/7.
    # (30 minutes is the sweet spot to save free API credits while keeping data fresh!)
    - cron: '*/30 * * * *'
  workflow_dispatch: # This allows you to still click "Run workflow" manually whenever you want to test it.

jobs:
  scrape-followers:
    runs-on: ubuntu-latest
    steps:
      - name: Načíst kód z repozitáře
        uses: actions/checkout@v4

      - name: Nastavit Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Nainstalovat knihovny
        run: |
          pip install requests supabase

      - name: Spustit skript
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python tracker.py
