name: Každominutový Sledovač do Supabase

on:
  schedule:
    - cron: '* * * * *' # Spouští se každou minutu (s limity GitHubu cca 3-7 minut)
  workflow_dispatch: # Tlačítko pro ruční spuštění

jobs:
  scrape-followers:
    runs-on: ubuntu-latest
    steps:
      - name: Načíst kód z repozitáře
        uses: actions/checkout@v4

      - name: Nastavit Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Nainstalovat Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Nainstalovat knihovny
        run: |
          pip install selenium webdriver-manager supabase

      - name: Spustit skript
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python tracker.py
